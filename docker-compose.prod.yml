services:
  app:
    build:
      context: .
      args:
        VITE_BUGSINK_DSN: ${VITE_BUGSINK_DSN:-}
    restart: unless-stopped
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DATABASE_URL: Host=db;Port=5432;Database=fasolt;Username=fasolt;Password=${DB_PASSWORD}
      OPENIDDICT_ENCRYPTION_CERT_PATH: /certs/encryption.pfx
      OPENIDDICT_SIGNING_CERT_PATH: /certs/signing.pfx
    volumes:
      - ./certs:/certs:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - gateway
    labels:
      traefik.enable: "true"
      traefik.docker.network: gateway
      traefik.http.routers.fasolt.rule: Host(`fasolt.app`) || Host(`www.fasolt.app`)
      traefik.http.routers.fasolt.entrypoints: websecure
      traefik.http.routers.fasolt.tls: "true"
      traefik.http.services.fasolt.loadbalancer.server.port: "8080"

  db:
    image: postgres:17.5
    restart: unless-stopped
    environment:
      POSTGRES_USER: fasolt
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: fasolt
    volumes:
      - ./db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fasolt -d fasolt"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

networks:
  internal:
  gateway:
    external: true
