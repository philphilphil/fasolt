name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: fasolt
          POSTGRES_PASSWORD: fasolt_dev
          POSTGRES_DB: fasolt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fasolt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build -v normal

  frontend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: fasolt.client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: fasolt.client

      - name: Type check
        run: npx vue-tsc --noEmit
        working-directory: fasolt.client

      - name: Test
        run: npx vitest run
        working-directory: fasolt.client
