name: Fasolt
options:
  bundleIdPrefix: com.fasolt
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

configFiles:
  Debug: local.xcconfig
  Release: local.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

packages:
  Textual:
    url: https://github.com/gonzalezreal/textual
    from: "0.3.1"

targets:
  Fasolt:
    type: application
    platform: iOS
    sources:
      - Fasolt
    dependencies:
      - package: Textual
    info:
      path: Fasolt/Info.plist
      properties:
        CFBundleDisplayName: Fasolt
        CFBundleURLTypes:
          - CFBundleURLName: com.fasolt.oauth
            CFBundleURLSchemes:
              - fasolt
        UILaunchScreen:
          UIColorName: ""
        UIBackgroundModes:
          - remote-notification
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: Fasolt/Fasolt.entitlements
      properties:
        aps-environment: production
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fasolt.app
        INFOPLIST_FILE: Fasolt/Info.plist

  FasoltTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FasoltTests
    dependencies:
      - target: Fasolt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fasolt.app.tests
        GENERATE_INFOPLIST_FILE: YES
