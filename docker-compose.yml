services:
  db:
    image: postgres:17.5
    restart: unless-stopped
    environment:
      POSTGRES_USER: fasolt
      POSTGRES_PASSWORD: fasolt_dev
      POSTGRES_DB: fasolt
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fasolt -d fasolt"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
